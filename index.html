<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>scholar · axom.app</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/variables.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/layout.css">
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">🎓 scholar</div>
    <div class="auth-sub">Gestão pedagógica · axom.app</div>
    <div class="form-group" style="margin-bottom:12px">
      <label>URL do servidor</label>
      <input id="api-base" class="form-control" placeholder="https://api.suaescola.com.br">
    </div>
    <div class="form-group" style="margin-bottom:12px">
      <label>Usuário</label>
      <input id="login-user" class="form-control" autocomplete="username">
    </div>
    <div class="form-group" style="margin-bottom:18px">
      <label>Senha</label>
      <input id="login-pass" class="form-control" type="password" autocomplete="current-password"
             onkeydown="if(event.key==='Enter') doLogin()">
    </div>
    <div id="auth-error" class="error-msg" style="display:none"></div>
    <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- APP SHELL -->
<div id="app" style="display:none">
  <aside class="sidebar">
    <div class="sidebar-logo">🎓 <span>scholar</span></div>
    <div class="sidebar-school" id="sbl">—</div>
    <nav class="sidebar-nav">
      <div class="sidebar-section">Presença</div>
      <div class="nav-item active" data-view="chamada"        onclick="goTo('chamada',this)">
        <span class="ico">🏫</span> Chamada
      </div>
      <div class="nav-item" data-view="diario"                onclick="goTo('diario',this)">
        <span class="ico">📓</span> Diário
      </div>
      <div class="nav-item" data-view="ocorrencias"           onclick="goTo('ocorrencias',this)">
        <span class="ico">⚠️</span> Ocorrências
      </div>
      <div class="sidebar-section">Alunos</div>
      <div class="nav-item" data-view="alunos"                onclick="goTo('alunos',this)">
        <span class="ico">👨‍🎓</span> Alunos
      </div>
      <div class="nav-item" data-view="matriculas"             onclick="goTo('matriculas',this)">
        <span class="ico">📌</span> Matrículas
      </div>
      <div class="nav-item" data-view="transferencias"         onclick="goTo('transferencias',this)">
        <span class="ico">🔀</span> Transferências
      </div>
      <div class="sidebar-section">Avaliações</div>
      <div class="nav-item" data-view="periodos"              onclick="goTo('periodos',this)">
        <span class="ico">📅</span> Períodos
      </div>
      <div class="nav-item" data-view="avaliacoes"            onclick="goTo('avaliacoes',this)">
        <span class="ico">📝</span> Avaliações
      </div>
      <div class="nav-item" data-view="notas"                 onclick="goTo('notas',this)">
        <span class="ico">🔢</span> Notas
      </div>
      <div class="nav-item" data-view="boletins"              onclick="goTo('boletins',this)">
        <span class="ico">📊</span> Boletins
      </div>
      <div class="sidebar-section">Sistema</div>
      <div class="nav-item" data-view="assinatura"            onclick="goTo('assinatura',this)">
        <span class="ico">💳</span> Assinatura
      </div>
    </nav>
    <div class="sidebar-footer">
      <a href="#" style="color:#818cf8" onclick="logout()">Sair ↩</a>
    </div>
  </aside>
  <main class="main" id="main-content"></main>
</div>

<!-- MODAL CONTAINER -->
<div id="modal-container"></div>

<script type="module" src="src/app.js"></script>
</body>
</html>
