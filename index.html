<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>scholar · axom.app</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --primary:#7c3aed;--primary-dark:#6d28d9;--primary-light:#ede9fe;
    --success:#16a34a;--success-light:#dcfce7;
    --warning:#d97706;--warning-light:#fef3c7;
    --danger:#dc2626;--danger-light:#fee2e2;
    --text:#111827;--text-secondary:#6b7280;--border:#e5e7eb;
    --bg:#f9fafb;--bg-white:#fff;--sidebar-w:228px;
    --radius:8px;--radius-sm:4px;
  }
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  #auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
  .auth-card{background:var(--bg-white);border-radius:12px;padding:40px;width:min(400px,90vw);box-shadow:0 4px 24px rgba(0,0,0,.1)}
  .auth-logo{font-size:28px;font-weight:800;color:var(--primary);margin-bottom:4px}
  .auth-sub{color:var(--text-secondary);font-size:14px;margin-bottom:28px}
  #app{display:flex;min-height:100vh}
  .sidebar{width:var(--sidebar-w);background:#1e1b4b;color:#e0e7ff;display:flex;flex-direction:column;flex-shrink:0;position:fixed;inset:0 auto 0 0;overflow-y:auto}
  .sidebar-logo{padding:22px 20px 16px;font-size:20px;font-weight:800;color:#fff;border-bottom:1px solid #312e81}
  .sidebar-logo span{color:#a78bfa}
  .sidebar-school{padding:10px 20px;font-size:12px;color:#818cf8;border-bottom:1px solid #312e81;word-break:break-word}
  .sidebar-section{padding:12px 20px 4px;font-size:10px;font-weight:700;letter-spacing:.8px;color:#6366f1;text-transform:uppercase}
  .sidebar-nav{flex:1;padding:8px 0}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;font-size:13.5px;color:#a5b4fc;transition:all .15s}
  .nav-item:hover{background:#312e81;color:#e0e7ff}
  .nav-item.active{background:#7c3aed;color:#fff}
  .nav-item .ico{font-size:16px;width:20px;text-align:center}
  .sidebar-footer{padding:16px 20px;font-size:12px;color:#4338ca;border-top:1px solid #312e81}
  .main{margin-left:var(--sidebar-w);flex:1;padding:28px;min-width:0}
  .page-title{font-size:22px;font-weight:700;margin-bottom:6px}
  .page-sub{color:var(--text-secondary);font-size:14px;margin-bottom:24px}
  .card{background:var(--bg-white);border-radius:var(--radius);border:1px solid var(--border);padding:20px}
  .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:24px}
  .stat-card{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
  .stat-label{font-size:11px;color:var(--text-secondary);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
  .stat-value{font-size:26px;font-weight:700}
  .stat-sub{font-size:12px;color:var(--text-secondary);margin-top:2px}
  .tbl-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th{text-align:left;padding:9px 12px;font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.4px;background:#f8fafc;border-bottom:2px solid var(--border)}
  td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text)}
  tr:last-child td{border-bottom:0}
  tr:hover td{background:#fafafa}
  td.grade-cell{text-align:center;font-weight:600;min-width:70px;padding:4px}
  td.grade-cell input{width:64px;text-align:center;border:1px solid var(--border);border-radius:4px;padding:4px 6px;font-size:13px}
  td.grade-cell input:focus{border-color:var(--primary);outline:none}
  .avg-cell{font-size:15px;font-weight:700;text-align:center}
  .avg-pass{color:var(--success)}
  .avg-warn{color:var(--warning)}
  .avg-fail{color:var(--danger)}
  .form-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:12px}
  .form-group{display:flex;flex-direction:column;gap:4px}
  label{font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.4px}
  .form-control{padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;color:var(--text);background:var(--bg-white);outline:none;width:100%}
  .form-control:focus{border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-light)}
  .form-actions{display:flex;gap:8px;margin-top:12px}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--radius-sm);border:none;font-size:13.5px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
  .btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-dark)}
  .btn-ghost{background:transparent;color:var(--primary);border:1px solid var(--border)}.btn-ghost:hover{background:var(--primary-light)}
  .btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:#b91c1c}
  .btn-success{background:var(--success);color:#fff}
  .btn-sm{padding:4px 10px;font-size:12px}
  .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
  .badge-success{background:var(--success-light);color:var(--success)}
  .badge-warning{background:var(--warning-light);color:var(--warning)}
  .badge-danger{background:var(--danger-light);color:var(--danger)}
  .badge-gray{background:#f3f4f6;color:#6b7280}
  .badge-purple{background:var(--primary-light);color:var(--primary)}
  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
  .toolbar-right{margin-left:auto;display:flex;gap:8px}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100}
  .modal{background:var(--bg-white);border-radius:var(--radius);padding:28px;width:min(540px,96vw);max-height:92vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.18)}
  .modal-title{font-size:18px;font-weight:700;margin-bottom:20px}
  .empty{text-align:center;padding:36px;color:var(--text-secondary)}
  .error-msg{color:var(--danger);font-size:13px;margin-top:6px}
  .loading{text-align:center;padding:24px;color:var(--text-secondary)}
  .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .section-title{font-size:16px;font-weight:600}
  .divider{height:1px;background:var(--border);margin:20px 0}
  /* Attendance grid */
  .att-grid{display:flex;flex-direction:column;gap:0}
  .att-row{display:grid;align-items:center;font-size:14px;border-bottom:1px solid var(--border);padding:8px 0}
  .att-row.header{font-weight:600;font-size:12px;color:var(--text-secondary);text-transform:uppercase}
  .att-items{display:flex;gap:8px}
  .att-btn{padding:4px 12px;border-radius:20px;border:1px solid var(--border);font-size:12px;font-weight:600;cursor:pointer;transition:all .12s}
  .att-btn.presente{background:var(--success-light);color:var(--success);border-color:var(--success)}
  .att-btn.ausente{background:var(--danger-light);color:var(--danger);border-color:var(--danger)}
  .att-btn.justificado{background:var(--warning-light);color:var(--warning);border-color:var(--warning)}
  .boletim-period{margin-bottom:24px}
  .boletim-period-title{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--primary)}
  .period-tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
  .tag-bimestre{background:#dbeafe;color:#1d4ed8}
  .tag-trimestre{background:#dcfce7;color:#15803d}
  .tag-semestre{background:#fef3c7;color:#b45309}
  .tag-modulo{background:#f3e8ff;color:#7e22ce}
  @media(max-width:768px){
    .sidebar{width:100%;position:relative;inset:auto}
    #app{flex-direction:column}
    .main{margin-left:0;padding:16px}
  }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">scholar</div>
    <div class="auth-sub">Gestão pedagógica · axom.app</div>
    <div class="form-group" style="margin-bottom:12px">
      <label>URL do servidor</label>
      <input id="api-base" class="form-control" placeholder="https://aula.suaescola.com.br">
    </div>
    <div class="form-group" style="margin-bottom:12px">
      <label>Usuário</label>
      <input id="login-user" class="form-control" autocomplete="username">
    </div>
    <div class="form-group" style="margin-bottom:18px">
      <label>Senha</label>
      <input id="login-pass" class="form-control" type="password" autocomplete="current-password">
    </div>
    <div id="auth-error" class="error-msg" style="display:none"></div>
    <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <aside class="sidebar">
    <div class="sidebar-logo">🎓 <span>scholar</span></div>
    <div class="sidebar-school" id="sbl">—</div>
    <nav class="sidebar-nav">
      <div class="sidebar-section">Presença</div>
      <div class="nav-item active" data-view="chamada"   onclick="goTo('chamada',this)"><span class="ico">🏫</span> Chamada</div>
      <div class="nav-item" data-view="diario"    onclick="goTo('diario',this)"><span class="ico">📓</span> Diário</div>
      <div class="nav-item" data-view="ocorrencias" onclick="goTo('ocorrencias',this)"><span class="ico">⚠️</span> Ocorrências</div>
      <div class="sidebar-section">Alunos</div>
      <div class="nav-item" data-view="alunos"    onclick="goTo('alunos',this)"><span class="ico">👨‍🎓</span> Alunos</div>
      <div class="nav-item" data-view="matriculas" onclick="goTo('matriculas',this)"><span class="ico">📌</span> Matrículas</div>
      <div class="nav-item" data-view="transferencias" onclick="goTo('transferencias',this)"><span class="ico">🔀</span> Transferências</div>
      <div class="sidebar-section">Avaliações</div>
      <div class="nav-item" data-view="periodos"  onclick="goTo('periodos',this)"><span class="ico">📅</span> Períodos</div>
      <div class="nav-item" data-view="avaliacoes" onclick="goTo('avaliacoes',this)"><span class="ico">📝</span> Avaliações</div>
      <div class="nav-item" data-view="notas"     onclick="goTo('notas',this)"><span class="ico">🔢</span> Notas</div>
      <div class="nav-item" data-view="boletins"  onclick="goTo('boletins',this)"><span class="ico">📊</span> Boletins</div>
      <div class="sidebar-section">Sistema</div>
      <div class="nav-item" data-view="assinatura" onclick="goTo('assinatura',this)"><span class="ico">💳</span> Assinatura</div>
    </nav>
    <div class="sidebar-footer"><a href="#" onclick="logout()">Sair ↩</a></div>
  </aside>
  <main class="main" id="main-content"></main>
</div>

<div id="modal-container"></div>

<script>
'use strict';
const S = { token:null, schoolId:null, apiBase:'', schoolName:'', view:'chamada', classes:[], teachers:[] };

const E = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtD = iso => iso ? new Date(iso+'T00:00:00').toLocaleDateString('pt-BR') : '—';
const q = s => document.querySelector(s);
function $$(s) { return [...document.querySelectorAll(s)]; }

function api(path, opts={}) {
  const url = S.apiBase.replace(/\/$/,'') + '/api' + path;
  return fetch(url, {
    headers: { 'Content-Type':'application/json', 'x-aula-token':S.token },
    ...opts, body: opts.body ? JSON.stringify(opts.body) : undefined,
  }).then(async r => {
    const d = await r.json().catch(()=>({}));
    if (!d.success && r.status===401) { logout(); throw new Error('Sessão expirada.'); }
    return d;
  });
}

function showModal(html) {
  const mc = q('#modal-container');
  mc.innerHTML = `<div class="modal-bg" id="mb">${html}</div>`;
  mc.querySelector('#mb').addEventListener('click', e => { if(e.target.id==='mb') closeModal(); });
}
function closeModal() { q('#modal-container').innerHTML=''; }

function periodTag(type) {
  const m = { bimestre:'tag-bimestre', trimestre:'tag-trimestre', semestre:'tag-semestre', modulo:'tag-modulo' };
  const labels = { bimestre:'Bimestre', trimestre:'Trimestre', semestre:'Semestre', modulo:'Módulo' };
  return `<span class="period-tag ${m[type]||'tag-bimestre'}">${labels[type]||type}</span>`;
}

function statusBadge(s) {
  const m = { ativo:'badge-success', ativa:'badge-success', active:'badge-success',
              aberta:'badge-danger', resolvida:'badge-success', inactive:'badge-gray' };
  const labels = { ativo:'Ativo', ativa:'Ativa', active:'Ativo', aberta:'Aberta',
                   resolvida:'Resolvida', inactive:'Inativo' };
  return `<span class="badge ${m[s]||'badge-gray'}">${labels[s]||E(s)}</span>`;
}

function avgClass(v) {
  if (v==null) return '';
  if (v>=7) return 'avg-pass';
  if (v>=5) return 'avg-warn';
  return 'avg-fail';
}

// ── Auth ─────────────────────────────────────────────────────────────────────
function init() {
  const p = new URLSearchParams(location.search);
  const tk = p.get('token') || localStorage.getItem('scholar_token');
  const si = p.get('schoolId') || localStorage.getItem('scholar_school_id');
  const ab = p.get('api') || localStorage.getItem('scholar_api_base') || '';
  if (ab) q('#api-base').value = ab;
  if (tk && si && ab) { S.token=tk; S.schoolId=Number(si); S.apiBase=ab; startApp(); }
}

async function doLogin() {
  const ab   = q('#api-base').value.trim();
  const user = q('#login-user').value.trim();
  const pass = q('#login-pass').value;
  if (!ab||!user||!pass) { showErr('Preencha todos os campos.'); return; }
  S.apiBase = ab;
  try {
    const d = await api('/auth/login', { method:'POST', body:{username:user,password:pass} });
    if (!d.success) { showErr(d.error||'Credenciais inválidas.'); return; }
    S.token=d.token; S.schoolId=d.admin?.schoolId||d.schoolId;
    localStorage.setItem('scholar_token', S.token);
    localStorage.setItem('scholar_school_id', String(S.schoolId));
    localStorage.setItem('scholar_api_base', S.apiBase);
    startApp();
  } catch(e) { showErr(e.message); }
}

function showErr(msg) { const el=q('#auth-error'); el.textContent=msg; el.style.display='block'; }

async function startApp() {
  q('#auth-screen').style.display='none';
  q('#app').style.display='flex';
  const [cls, tch] = await Promise.all([
    api(`/classes?schoolId=${S.schoolId}`).then(d=>d.data||d||[]).catch(()=>[]),
    api(`/teachers?schoolId=${S.schoolId}`).then(d=>d.data||d||[]).catch(()=>[]),
  ]);
  S.classes = cls; S.teachers = tch;
  q('#sbl').textContent = `Escola #${S.schoolId}`;
  goTo('chamada', document.querySelector('[data-view=chamada]'));
}

function logout() {
  ['scholar_token','scholar_school_id'].forEach(k=>localStorage.removeItem(k));
  location.reload();
}

function goTo(view, el) {
  S.view=view;
  $$('.nav-item').forEach(n=>n.classList.remove('active'));
  el?.classList.add('active');
  const main = q('#main-content');
  main.innerHTML='<div class="loading">Carregando…</div>';
  const views = { chamada, diario, ocorrencias, alunos, matriculas, transferencias, periodos, avaliacoes, notas, boletins, assinatura };
  views[view]?.(main);
}

// ════════════════════════════════════════════════════════════════════════════ //
// CHAMADA
// ════════════════════════════════════════════════════════════════════════════ //
async function chamada(main) {
  const today = new Date().toISOString().slice(0,10);
  main.innerHTML = `
    <div class="page-title">Chamada</div>
    <div class="page-sub">Registro de presença por turma</div>
    <div class="card" style="max-width:720px">
      <div class="form-row">
        <div class="form-group">
          <label>Turma</label>
          <select id="ch-class" class="form-control">
            <option value="">Selecione…</option>
            ${S.classes.map(c=>`<option value="${c.id}">${E(c.name)}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label>Data</label>
          <input id="ch-date" class="form-control" type="date" value="${today}">
        </div>
        <div class="form-group">
          <label>Período / Aula</label>
          <select id="ch-period" class="form-control">
            ${[1,2,3,4,5,6].map(n=>`<option value="${n}">${n}º tempo</option>`).join('')}
          </select>
        </div>
        <div class="form-group" style="justify-content:flex-end">
          <label>&nbsp;</label>
          <button class="btn btn-primary" onclick="loadChamada()">Carregar turma</button>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:16px">
        <label>Assunto da aula</label>
        <input id="ch-subject" class="form-control" placeholder="Digite o conteúdo da aula">
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label>Diário / Observações</label>
        <textarea id="ch-content" class="form-control" rows="2" placeholder="Observações gerais"></textarea>
      </div>
    </div>
    <div id="ch-form" style="margin-top:20px"></div>`;
}

async function loadChamada() {
  const classId = q('#ch-class').value;
  const date    = q('#ch-date').value;
  const period  = q('#ch-period').value;
  const formEl  = q('#ch-form');
  if (!classId || !date) { formEl.innerHTML='<div class="error-msg">Selecione turma e data.</div>'; return; }
  formEl.innerHTML='<div class="loading">Carregando alunos…</div>';
  const [students, existing] = await Promise.all([
    api(`/escolar/students?schoolId=${S.schoolId}&classId=${classId}`).then(d=>d.data||d||[]).catch(()=>[]),
    api(`/escolar/attendance?schoolId=${S.schoolId}&classId=${classId}&date=${date}`).then(d=>d.data||d||[]).catch(()=>[]),
  ]);
  const record = existing.find(r=>String(r.period)===String(period));
  const existingArr = record ? (Array.isArray(record.students_json)?record.students_json:JSON.parse(record.students_json||'[]')) : [];
  const existingMap = Object.fromEntries(existingArr.map(s=>[s.student_id,s]));
  
  if (!students.length) { formEl.innerHTML='<div class="empty">Nenhum aluno matriculado nesta turma. <a href="#" onclick="goTo(\'matriculas\',document.querySelector(\'[data-view=matriculas]\'))">Matricular alunos →</a></div>'; return; }

  window._attStudents = students.map(s=>({
    student_id: s.id, name: s.name,
    status: existingMap[s.id]?.status || 'presente',
    note: existingMap[s.id]?.note || '',
  }));

  renderAttGrid(formEl);
}

function renderAttGrid(formEl) {
  const students = window._attStudents || [];
  const counts = students.reduce((a,s)=>{a[s.status]=(a[s.status]||0)+1;return a;},{});
  formEl.innerHTML = `
    <div class="card">
      <div class="section-header">
        <div>
          <span class="badge badge-success">${counts.presente||0} presentes</span>
          <span class="badge badge-danger" style="margin-left:6px">${counts.ausente||0} ausentes</span>
          <span class="badge badge-warning" style="margin-left:6px">${counts.justificado||0} justificados</span>
        </div>
        <div>
          <button class="btn btn-ghost btn-sm" onclick="setAllAtt('presente')">Todos presentes</button>
        </div>
      </div>
      <div class="att-grid">
        ${students.map((s,i)=>`
          <div class="att-row" style="grid-template-columns:1fr auto;gap:12px" id="att-row-${i}">
            <div style="font-weight:500">${E(s.name)}</div>
            <div class="att-items">
              ${['presente','ausente','justificado'].map(st=>`
                <button class="att-btn ${s.status===st?st:''}" onclick="setAtt(${i},'${st}')">${st.charAt(0).toUpperCase()+st.slice(1)}</button>
              `).join('')}
            </div>
          </div>`).join('')}
      </div>
      <div class="form-actions" style="margin-top:16px">
        <button class="btn btn-primary" onclick="saveChamada()">💾 Salvar chamada</button>
      </div>
    </div>`;
}

function setAllAtt(status) {
  (window._attStudents||[]).forEach((s,i)=>{ s.status=status; });
  renderAttGrid(q('#ch-form'));
}

function setAtt(i, status) {
  if (window._attStudents?.[i]) window._attStudents[i].status = status;
  renderAttGrid(q('#ch-form'));
}

async function saveChamada() {
  const classId  = q('#ch-class')?.value;
  const date     = q('#ch-date')?.value;
  const period   = q('#ch-period')?.value;
  const subject  = q('#ch-subject')?.value?.trim() || '';
  const content  = q('#ch-content')?.value?.trim() || '';
  const students = window._attStudents || [];
  if (!classId || !date || !students.length) return alert('Dados incompletos.');
  const d = await api('/escolar/attendance', { method:'POST', body:{
    school_id:S.schoolId, class_id:classId, date, period, subject,
    lesson_content:content, students,
  }});
  if (d.success!==false) { alert('✅ Chamada salva!'); }
  else alert('Erro: '+(d.error||'desconhecido'));
}

// ════════════════════════════════════════════════════════════════════════════ //
// DIÁRIO
// ════════════════════════════════════════════════════════════════════════════ //
async function diario(main) {
  main.innerHTML = `
    <div class="page-title">Diário do Professor</div>
    <div class="page-sub">Histórico de chamadas e conteúdos registrados</div>
    <div class="toolbar">
      <select id="di-class" class="form-control" style="width:200px" onchange="loadDiario()">
        <option value="">Todas as turmas</option>

const SEV_BADGE = { baixa:'badge-success', media:'badge-warning', alta:'badge-danger' };
const SEV_LABEL = { baixa:'Baixa', media:'Média', alta:'Alta' };

async function loadOcorrencias() {
  const status = q('#oc-status')?.value || '';

  ob.innerHTML = `

      <table>

              <td>${fmtD(r.created_at?.slice?.(0,10))}</td>

function modalOcorrencia(oc) {
  const students = window._ocStudents || [];
  showModal(`

      <div class="form-row">
        <div class="form-group">
          <label>Tipo</label>

            <option value="class">Turma</option>
            <option value="teacher">Professor</option>
          </select>

        <div class="form-group">
          <label>Gravidade</label>
          <select id="oc-sev" class="form-control">
            <option value="baixa">Baixa</option>
            <option value="media" selected>Média</option>

          </select>

        </select>
      </div>

        <input id="oc-title" class="form-control" placeholder="Resumo da ocorrência">

}

async function updateOcRef() {
  const type = q('#oc-type')?.value;
  const lbl  = q('#oc-ref-label');
  const sel  = q('#oc-ref');
  if (!lbl||!sel) return;
  const labels = { student:'Aluno', class:'Turma', teacher:'Professor' };
  lbl.textContent = labels[type]||type;
  let items = [];
  if (type==='student') {
    items = await api(`/escolar/students?schoolId=${S.schoolId}`).then(d=>d.data||d||[]).catch(()=>[]);
  } else if (type==='class') {
    items = S.classes;
  } else if (type==='teacher') {
    items = S.teachers;
  }
  sel.innerHTML = `<option value="">Selecione…</option>${items.map(i=>`<option value="${i.id}">${E(i.name)}</option>`).join('')}`;
}

async function saveOcorrencia() {
  const type   = q('#oc-type').value;
  const title  = q('#oc-title').value.trim();
  const refId  = q('#oc-ref').value;
  const severity = q('#oc-sev').value;
  const desc   = q('#oc-desc').value.trim();
  if (!title) { q('#oc-err').textContent='Título obrigatório.'; q('#oc-err').style.display='block'; return; }
  const body = { school_id:S.schoolId, type, title, description:desc, severity };
  if (type==='student') body.student_id = refId;
  if (type==='class')   body.class_id   = refId;
  if (type==='teacher') body.teacher_id = refId;
  const d = await api('/escolar/occurrences', { method:'POST', body });
  if (!d.success) { q('#oc-err').textContent=d.error||'Erro.'; q('#oc-err').style.display='block'; return; }
  closeModal();
  goTo('ocorrencias', document.querySelector('[data-view=ocorrencias]'));
}

async function resolveOcorrencia(id) {
  if (!confirm('Marcar como resolvida?')) return;
  await api(`/escolar/occurrences/${id}`, { method:'PUT', body:{ status:'resolvida' } });
  loadOcorrencias();
}

async function deleteOcorrencia(id) {
  if (!confirm('Excluir ocorrência?')) return;
  await api(`/escolar/occurrences/${id}`, { method:'DELETE' });
  loadOcorrencias();
}

let _alunosCache = [];

  const ab = q('#al-body');

function filterAlunos() {
  const term = (q('#al-search')?.value||'').toLowerCase();

}

function renderAlunosTable(rows) {

async function saveAluno(id) {
  const body = {
    school_id: S.schoolId,
    name: q('#al-name').value.trim(),
    registration: q('#al-reg').value.trim()||null,
    email: q('#al-email').value.trim()||null,
    phone: q('#al-phone').value.trim()||null,
    parent_name: q('#al-pname').value.trim()||null,
    parent_phone: q('#al-pphone').value.trim()||null,
  };
  if (id!==null) body.active = q('#al-active').value==='1';
  if (!body.name) { q('#al-err').textContent='Nome obrigatório.'; q('#al-err').style.display='block'; return; }
  const d = id===null
    ? await api('/escolar/students', { method:'POST', body })
    : await api(`/escolar/students/${id}`, { method:'PUT', body });
  if (!d.success) { q('#al-err').textContent=d.error||'Erro.'; q('#al-err').style.display='block'; return; }
  closeModal(); loadAlunos();
}

async function deleteAluno(id) {
  if (!confirm('Excluir aluno? Esta ação remove também as matrículas.')) return;

  loadAlunos();
}

async function matriculas(main) {
  main.innerHTML = `
    <div class="page-title">Matrículas</div>
    <div class="page-sub">Vincule alunos às turmas</div>
    <div class="toolbar">
      <select id="mt-class" class="form-control" style="width:220px" onchange="loadMatriculas()">

      </select>

}

async function loadMatriculas() {
  const classId = q('#mt-class')?.value;
  const mb = q('#mt-body');
  if (!classId || !mb) return;
  mb.innerHTML='<div class="loading">Carregando…</div>';
  const [enrolled, all] = await Promise.all([
    api(`/escolar/students?schoolId=${S.schoolId}&classId=${classId}`).then(d=>d.data||d||[]).catch(()=>[]),
    api(`/escolar/students?schoolId=${S.schoolId}`).then(d=>d.data||d||[]).catch(()=>[]),
  ]);
  const enrolledIds = new Set(enrolled.map(e=>e.id));
  const notEnrolled = all.filter(a=>!enrolledIds.has(a.id)&&a.active);
  mb.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div class="card">
        <div class="section-header">
          <span class="section-title">Matriculados</span>
          <span class="badge badge-purple">${enrolled.length}</span>
        </div>
        ${enrolled.length ? `<div class="tbl-wrap">
          <table>
            <thead><tr><th>Aluno</th><th>Matrícula</th><th>Ações</th></tr></thead>
            <tbody>
              ${enrolled.map(e=>`<tr>
                <td>${E(e.name)}</td>
                <td>${E(e.registration||'—')}</td>
                <td><button class="btn btn-danger btn-sm" onclick="removeMatricula(${e.enrollment_id},${classId})">✗ Remover</button></td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>` : '<div class="empty" style="padding:16px">Nenhum aluno matriculado.</div>'}
      </div>
      <div class="card">
        <div class="section-header">
          <span class="section-title">Disponíveis para matricular</span>
        </div>
        ${notEnrolled.length ? `<div class="tbl-wrap">
          <table>
            <thead><tr><th>Aluno</th><th>Ações</th></tr></thead>
            <tbody>
              ${notEnrolled.map(a=>`<tr>
                <td>${E(a.name)}</td>
                <td><button class="btn btn-success btn-sm" onclick="addMatricula(${a.id},${classId})">+ Matricular</button></td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>` : '<div class="empty" style="padding:16px">Todos os alunos já estão matriculados.</div>'}
      </div>
    </div>`;
}

async function addMatricula(studentId, classId) {
  const d = await api('/escolar/enrollments', { method:'POST', body:{ school_id:S.schoolId, student_id:studentId, class_id:classId } });
  if (d.success!==false) loadMatriculas();
  else alert(d.error||'Erro ao matricular.');
}

async function removeMatricula(enrollmentId, classId) {
  if (!confirm('Remover matrícula?')) return;
  await api(`/escolar/enrollments/${enrollmentId}`, { method:'DELETE' });
  loadMatriculas();
}

async function transferencias(main) {
  main.innerHTML = `
    <div class="page-title">Transferências</div>
    <div class="page-sub">Mova um aluno de uma turma para outra</div>
    <div class="card" style="max-width:560px;margin-bottom:24px">
      <div class="section-title" style="margin-bottom:16px">Nova Transferência</div>
      <div class="form-row">
        <div class="form-group">
          <label>Aluno</label>
          <select id="tr-student" class="form-control" onchange="loadTrFromClass()">
            <option value="">Selecione…</option>
          </select>
        </div>
        <div class="form-group">
          <label>Turma de origem</label>
          <select id="tr-from" class="form-control"><option value="">—</option></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Turma de destino</label>
          <select id="tr-to" class="form-control">
            <option value="">Selecione…</option>
            ${S.classes.map(c=>`<option value="${c.id}">${E(c.name)}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label>Data da transferência</label>
          <input id="tr-date" class="form-control" type="date" value="${new Date().toISOString().slice(0,10)}">
        </div>
      </div>
      <div class="form-group" style="margin-bottom:14px">
        <label>Motivo (opcional)</label>
        <input id="tr-reason" class="form-control" placeholder="Ex: troca de turno">
      </div>
      <div id="tr-err" class="error-msg" style="display:none"></div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="saveTransfer()">Transferir aluno</button>
      </div>
    </div>`;
  
  // Carrega alunos
  const students = await api(`/escolar/students?schoolId=${S.schoolId}`).then(d=>d.data||d||[]).catch(()=>[]);
  const sel = q('#tr-student');
  students.filter(s=>s.active).forEach(s=>{
    const o = document.createElement('option');
    o.value=s.id; o.textContent=s.name; sel.appendChild(o);
  });
}

async function loadTrFromClass() {
  const studentId = q('#tr-student')?.value;
  const frSel = q('#tr-from');
  if (!studentId || !frSel) return;
  // Busca turmas onde o aluno está matriculado
  const enrolled = await api(`/escolar/students?schoolId=${S.schoolId}&classId=`).then(d=>d.data||d||[]).catch(()=>[]);
  frSel.innerHTML = `<option value="">Selecione…</option>`;
  // Lista todas as turmas como opção (simplificado)
  S.classes.forEach(c=>{ const o=document.createElement('option'); o.value=c.id; o.textContent=c.name; frSel.appendChild(o); });
}

async function saveTransfer() {
  const body = {
    school_id: S.schoolId,
    student_id: q('#tr-student')?.value,
    from_class_id: q('#tr-from')?.value,
    to_class_id: q('#tr-to')?.value,
    transfer_date: q('#tr-date')?.value,
    reason: q('#tr-reason')?.value?.trim()||null,
  };
  if (!body.student_id||!body.from_class_id||!body.to_class_id) { q('#tr-err').textContent='Selecione aluno, turma de origem e destino.'; q('#tr-err').style.display='block'; return; }
  if (body.from_class_id===body.to_class_id) { q('#tr-err').textContent='As turmas devem ser diferentes.'; q('#tr-err').style.display='block'; return; }
  const d = await api('/escolar/transfers', { method:'POST', body });
  if (d.success!==false) { alert('✅ Transferência realizada com sucesso!'); goTo('transferencias', document.querySelector('[data-view=transferencias]')); }
  else { q('#tr-err').textContent=d.error||'Erro.'; q('#tr-err').style.display='block'; }
}

async function createPeriodTemplate() {
  const year    = Number(q('#pt-year').value);
  const type    = q('#pt-type').value;
  const formula = q('#pt-formula').value;
  const counts  = { bimestre:4, trimestre:3, semestre:2, modulo:4 };
  const n       = counts[type];
  const monthSplit = { bimestre:3, trimestre:4, semestre:6, modulo:3 };
  const span    = monthSplit[type];
  const names   = { bimestre:'º Bimestre', trimestre:'º Trimestre', semestre:'º Semestre', modulo:'º Módulo' };
  const name_sfx = names[type];
  for (let i=0; i<n; i++) {
    const startM = i*span+1;
    const endM   = Math.min((i+1)*span, 12);
    const start  = `${year}-${String(startM).padStart(2,'0')}-01`;
    const lastDay = new Date(year, endM, 0).getDate();
    const end    = `${year}-${String(endM).padStart(2,'0')}-${lastDay}`;
    await api('/escolar/periods', { method:'POST', body:{
      school_id:S.schoolId, name:`${i+1}${name_sfx} ${year}`,
      type, year, sequence:i+1, start_date:start, end_date:end, formula,
    }}).catch(()=>{});
  }
  closeModal();
  goTo('periodos', document.querySelector('[data-view=periodos]'));
}

async function loadNotas() {

  const subjects = [...new Set(assessments.map(a=>a.subject))].sort();
  
  nb.innerHTML = `
    <div class="card">
      <div class="section-header">
        <span class="section-title">Lançamento de Notas</span>

                <td><strong>${E(student.name)}</strong><br><small style="color:var(--text-secondary)">${E(student.registration||'')}</small></td>

async function saveNotasBulk(classId, periodId) {
  const inputs = $$('#notas-table input[data-student]');
  const grades = inputs.map(inp => ({
    student_id: Number(inp.dataset.student),
    assessment_id: Number(inp.dataset.assessment),
    class_id: Number(inp.dataset.class),
    period_id: Number(inp.dataset.period),
    score: inp.value !== '' ? Number(inp.value) : null,
    absent: false,

async function loadBoletins() {

      </div>
      <div class="tbl-wrap">
        <table>
          <thead>
            <tr>
              <th style="min-width:140px">Disciplina</th>
              ${perList.map(p=>`<th style="text-align:center">${E(p.period_name)}</th>`).join('')}
              <th style="text-align:center">Média Final</th>
            </tr>
          </thead>
          <tbody>
            ${(subjects||[]).map(subj=>{
              const periodAvgs = perList.map(p=>{
                const pData = student.periods?.find(pd=>pd.period_id===p.period_id);
                const sData = pData?.subjects?.find(s=>s.subject===subj);
                return sData?.average??null;

                <td><strong>${E(subj)}</strong></td>
                ${periodAvgs.map(v=>`<td class="avg-cell ${avgClass(v)}">${v!==null?v:'—'}</td>`).join('')}
                <td class="avg-cell ${avgClass(finalAvg)}" style="font-size:16px">${finalAvg!==null?finalAvg:'—'}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>`).join('');
}

// ════════════════════════════════════════════════════════════════════════════ //
// ASSINATURA
// ════════════════════════════════════════════════════════════════════════════ //
async function assinatura(main) {
  const status = await api(`/escolar/status?schoolId=${S.schoolId}`).then(d=>d.data||d).catch(()=>({active:false}));
  main.innerHTML = `
    <div class="page-title">Assinatura — Addon Escolar</div>
    <div class="page-sub">Gerencie a contratação do módulo pedagógico</div>
    <div class="card" style="max-width:560px">
      <div style="margin-bottom:16px">
        <strong>Status:</strong> ${statusBadge(status.active?'ativo':'inactive')}
        ${status.devMode?'<span class="badge badge-warning" style="margin-left:8px">DEV MODE</span>':''}
      </div>
      ${status.active ? `
        <div style="font-size:14px;margin-bottom:16px">
          <strong>Plano:</strong> ${E(status.plan||'—')}<br>
          <strong>Turmas usadas:</strong> ${status.classCount||0} / ${status.maxClasses||'∞'}
        </div>
        <button class="btn btn-danger" onclick="cancelEscolar()">Cancelar addon</button>
      ` : `
        <p style="margin-bottom:20px;font-size:14px;color:var(--text-secondary)">Nenhum plano ativo. Escolha um plano para ativar o módulo escolar.</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          ${[['lite','Lite','≤10 turmas · R$560/mês'],['basic','Basic','≤30 turmas · R$980/mês'],
             ['flex','Flex','≤60 turmas · R$1.790/mês'],['total','Total','Ilimitado · R$2.600/mês']].map(([v,l,d])=>`
            <button class="btn btn-ghost" style="flex-direction:column;align-items:flex-start;padding:14px;height:auto" onclick="subscribeEscolar('${v}')">
              <span style="font-weight:700">${l}</span>
              <span style="font-size:12px;color:var(--text-secondary)">${d}</span>
            </button>`).join('')}
        </div>
      `}
    </div>`;
}

async function subscribeEscolar(plan) {
  const d = await api('/escolar/subscribe', { method:'POST', body:{school_id:S.schoolId, plan_type:plan} });
  if (d.success!==false) goTo('assinatura', document.querySelector('[data-view=assinatura]'));
  else alert('Erro: '+(d.error||'desconhecido'));
}

async function cancelEscolar() {
  if (!confirm('Cancelar o addon Escolar?')) return;
  await api('/escolar/cancel', { method:'POST', body:{school_id:S.schoolId} });
  goTo('assinatura', document.querySelector('[data-view=assinatura]'));
}

// Start
init();
</script>
